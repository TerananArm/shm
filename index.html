<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHM Visual Logic Lab - เลื่อนเพื่อเรียนรู้</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background: #f8fafc; color: #1e293b; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; height: 40px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #2563eb; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-top: -11px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; }
        .active-tab { background: #1e293b; color: white; font-weight: 800; transform: translateY(-2px); }
        .math-box { background: #1e293b; color: #60a5fa; border-radius: 1rem; padding: 0.75rem; font-family: 'JetBrains Mono', monospace; border-left: 6px solid #2563eb; }
        .highlight-num { color: #facc15; font-weight: 900; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
        .ripple { position: absolute; border: 2px solid #2563eb; border-radius: 50%; animation: ripple 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [topic, setTopic] = useState(5); // Start with Topic 5 (Spring) to show clear logic
            const [params, setParams] = useState({ k: 15, m: 1.0, A: 60, L: 1.5, g: 9.8 });
            const [time, setTime] = useState(0);
            const requestRef = useRef();
            const prevT = useRef();

            useEffect(() => {
                const animate = (t) => {
                    if (prevT.current !== undefined) {
                        const deltaTime = (t - prevT.current) / 1000;
                        setTime(v => v + deltaTime);
                    }
                    prevT.current = t;
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            const physics = useMemo(() => {
                const isPendulum = topic === 6;
                // สูตรหัวใจ: โอเมก้า (ความเร็วเชิงมุม)
                const omega = isPendulum ? Math.sqrt(params.g / params.L) : Math.sqrt(params.k / params.m);
                const T = (2 * Math.PI) / omega;
                const phase = omega * time;
                
                // คำนวณตำแหน่ง (x)
                const x = isPendulum ? (params.A/150) * Math.cos(phase) : params.A * Math.cos(phase);
                // คำนวณความเร็ว (v) -> v_max = omega * A
                const v = isPendulum ? -(params.A/150) * omega * Math.sin(phase) : -params.A * omega * Math.sin(phase);
                
                return { omega, T, x, v, phase };
            }, [topic, params, time]);

            const renderSimulation = () => {
                const { x, v } = physics;
                const cx = 200, cy = 110;

                if (topic === 6) { // โหมดลูกตุ้ม: พิสูจน์เรื่อง L และ m
                    const lx = cx + Math.sin(x) * (params.L * 70);
                    const ly = 20 + Math.cos(x) * (params.L * 70);
                    return (
                        <svg width="100%" height="220" viewBox="0 0 400 220" className="drop-shadow-xl">
                            <line x1={cx} y1="20" x2={lx} y2={ly} stroke="#94a3b8" strokeWidth="4" />
                            <circle cx={cx} cy="20" r="6" fill="#1e293b" />
                            <circle cx={lx} cy={ly} r={15 + params.m * 5} fill="#2563eb" stroke="white" strokeWidth="3" />
                            <text x={lx} y={ly+5} fill="white" textAnchor="middle" className="text-[10px] font-black">{params.m}kg</text>
                            <text x={cx} y="200" textAnchor="middle" className="text-xs font-bold text-slate-400 italic">"ลองปรับมวลดู... ความเร็วแกว่งจะไม่เปลี่ยน!"</text>
                        </svg>
                    );
                }

                // โหมดสปริงและอื่นๆ: พิสูจน์เรื่อง k และ m
                return (
                    <svg width="100%" height="220" viewBox="0 0 400 220" className="drop-shadow-xl">
                        <line x1={cx} y1="40" x2={cx} y2="180" stroke="#cbd5e1" strokeDasharray="5,5" />
                        <rect x="0" y="90" width="15" height="40" fill="#1e293b" />
                        <path d={`M 15,110 ${Array.from({length: 21}).map((_, i) => `L ${15 + i*(150+x)/21},${110 + (i%2?20:-20)*(i===0||i===21?0:1)}`).join(' ')}`} fill="none" stroke={topic === 1 ? "#ef4444" : "#2563eb"} strokeWidth={2 + params.k/10} />
                        <rect x={15+150+x-25} y="85" width="50" height="50" rx="10" fill="#2563eb" stroke="white" strokeWidth="3" />
                        <text x={15+150+x} y="115" fill="white" textAnchor="middle" className="text-xs font-black">{params.m}kg</text>
                        
                        {/* แสดงแรงดึงกลับในบทที่ 1 */}
                        {topic === 1 && (
                            <g>
                                <line x1={15+150+x} y1="110" x2={cx} y2="110" stroke="#ef4444" strokeWidth="6" markerEnd="url(#arr)" />
                                <text x={(15+150+x+cx)/2} y="95" fill="#ef4444" textAnchor="middle" className="text-[10px] font-black italic">แรง F = -{params.k}x</text>
                                <defs><marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker></defs>
                            </g>
                        )}
                        {/* แสดงความเร็วในบทที่ 3 */}
                        {topic === 3 && (
                            <g>
                                <line x1={15+150+x} y1="150" x2={15+150+x + v*1.2} y2="150" stroke="#10b981" strokeWidth="6" markerEnd="url(#arr-v)" />
                                <text x={15+150+x + v*1.2} y="170" fill="#10b981" textAnchor="middle" className="text-[10px] font-black">v = {Math.abs(v).toFixed(0)}</text>
                                <defs><marker id="arr-v" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs>
                            </g>
                        )}
                    </svg>
                );
            };

            const topicData = [
                { id: 1, title: '1. ลักษณะการเคลื่อนที่', logic: 'แรงดึงกลับ (F) แปรผันตามค่า k และระยะ x', formula: `F = -${params.k} × x` },
                { id: 2, title: '2. ปริมาณที่เกี่ยวข้อง', logic: 'คาบ (T) คือเวลาครบรอบ สังเกตเวลาที่วัตถุวิ่งกลับมาที่เดิม', formula: `T = ${physics.T.toFixed(2)} วินาที` },
                { id: 3, title: '3. ความสัมพันธ์ x, v, a', logic: 'แอมพลิจูด (A) มาก จะทำให้ความเร็วสูงสุด (v_max) มากขึ้นด้วย', formula: `v_max = ωA = ${(physics.omega * params.A).toFixed(0)}` },
                { id: 4, title: '4. วิเคราะห์กราฟ', logic: 'กราฟตำแหน่ง (x) และความเร็ว (v) จะเยื้องเฟสกันเสมอ', formula: `x = ${params.A} cos(ωt)` },
                { id: 5, title: '5. วัตถุติดปลายสปริง', logic: 'มวล (m) อยู่ตัวหาร ยิ่งมวลมาก วัตถุยิ่งเฉื่อยและสั่นช้าลง', formula: `ω = √(${params.k} / ${params.m}) = ${physics.omega.toFixed(2)}` },
                { id: 6, title: '6. ลูกตุ้มนาฬิกา', logic: 'เชือกยิ่งยาว (L) คาบแกว่งยิ่งนานขึ้น แต่มวลไม่มีผลเลย', formula: `ω = √(9.8 / ${params.L}) = ${physics.omega.toFixed(2)}` }
            ];

            return (
                <div className="h-screen flex flex-col bg-slate-50 overflow-hidden">
                    
                    {/* Topic Menu */}
                    <div className="bg-white border-b border-slate-200 p-2 overflow-x-auto tab-scroll flex gap-2 z-30">
                        {topicData.map(t => (
                            <button key={t.id} onClick={() => setTopic(t.id)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all ${topic === t.id ? 'active-tab shadow-lg' : 'text-slate-400 bg-slate-100'}`}>
                                บทที่ {t.id}
                            </button>
                        ))}
                    </div>

                    {/* Simulation Area */}
                    <div className="flex-1 relative flex flex-col items-center justify-center p-6 pb-2">
                        <div className="w-full h-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 relative overflow-hidden flex flex-col">
                            <div className="p-6 pb-0 flex justify-between items-center">
                                <div>
                                    <h2 className="text-lg font-black text-slate-800 leading-none tracking-tighter uppercase">{topicData[topic-1].title}</h2>
                                    <p className="text-[10px] font-bold text-blue-500 mt-1 uppercase tracking-widest italic">{topicData[topic-1].logic}</p>
                                </div>
                                <div className="bg-slate-100 p-2 rounded-2xl flex gap-2">
                                    <button onClick={() => setTime(0)} className="text-slate-400 active:scale-90 transition-transform">
                                        <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5"/></svg>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative">
                                {renderSimulation()}
                            </div>

                            {/* Dynamic Formula Display */}
                            <div className="p-6 pt-0">
                                <div className="math-box shadow-lg">
                                    <div className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest opacity-60">วิธีคิดและค่าที่คำนวณได้จริง:</div>
                                    <div className="text-lg flex justify-center items-center gap-2">
                                        <span className="mono">{topicData[topic-1].formula.split('=')[0]} = </span>
                                        <span className="highlight-num">{topicData[topic-1].formula.split('=')[1]}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Sliders Panel */}
                    <div className="bg-white rounded-t-[3rem] p-8 space-y-6 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] z-20 border-t border-slate-100">
                        
                        {/* Slider 1: Amplitude (Common for all) */}
                        <div className="space-y-2">
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">แอมพลิจูด (A): <span className="text-blue-600 font-mono">{params.A}</span></span>
                                <span className="text-[9px] font-bold text-slate-300">ระยะดึงมวล</span>
                            </div>
                            <input type="range" min="20" max="95" value={params.A} onChange={e => setParams({...params, A: +e.target.value})} />
                        </div>

                        {/* Sliders 2 & 3: Context Aware */}
                        <div className="grid grid-cols-2 gap-8">
                            {topic === 6 ? (
                                <div className="col-span-2 space-y-4">
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">ยาวเชือก (L): <span className="text-blue-600 font-mono">{params.L}m</span></div>
                                        <input type="range" min="0.5" max="2.5" step="0.1" value={params.L} onChange={e => setParams({...params, L: +e.target.value})} />
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">มวล (m): <span className="text-blue-600 font-mono">{params.m}kg</span></div>
                                        <input type="range" min="0.5" max="5.0" step="0.5" value={params.m} onChange={e => setParams({...params, m: +e.target.value})} />
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">มวล (m): <span className="text-blue-600 font-mono">{params.m}kg</span></div>
                                        <input type="range" min="0.5" max="5.0" step="0.5" value={params.m} onChange={e => setParams({...params, m: +e.target.value})} />
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">สปริง (k): <span className="text-blue-600 font-mono">{params.k}</span></div>
                                        <input type="range" min="5" max="50" value={params.k} onChange={e => setParams({...params, k: +e.target.value})} />
                                    </div>
                                </>
                            )}
                        </div>

                        {/* Logic Hint */}
                        <div className="text-center">
                            <p className="text-[10px] font-bold text-slate-400 italic">"ลองเลื่อนนิ้วดูการเปลี่ยนแปลง... ฟิสิกส์ไม่ใช่เรื่องยากถ้าเราเห็นภาพ!"</p>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
