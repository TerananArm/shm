<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHM Visual Logic Lab - เลื่อนเพื่อเรียนรู้</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background: #f8fafc; color: #1e293b; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; height: 40px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #2563eb; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-top: -11px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; }
        .active-tab { background: #1e293b; color: white; font-weight: 800; transform: translateY(-2px); }
        .math-box { background: #1e293b; color: #60a5fa; border-radius: 1rem; padding: 1.25rem; font-family: 'JetBrains Mono', monospace; border-left: 6px solid #2563eb; }
        .highlight-num { color: #facc15; font-weight: 900; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
        .ripple { position: absolute; border: 2px solid #2563eb; border-radius: 50%; animation: ripple 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [topic, setTopic] = useState(1);
            const [params, setParams] = useState({ k: 15, m: 1.0, A: 60, L: 1.5, g: 9.8 });
            const [time, setTime] = useState(0);
            const requestRef = useRef();
            const prevT = useRef();
            const graphHistory = useRef([]);

            useEffect(() => {
                const animate = (t) => {
                    if (prevT.current !== undefined) {
                        const deltaTime = (t - prevT.current) / 1000;
                        setTime(v => v + deltaTime);
                    }
                    prevT.current = t;
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            const physics = useMemo(() => {
                const isPendulum = topic === 6;
                const safeL = params.L <= 0 ? 0.001 : params.L;
                const safeM = params.m <= 0 ? 0.001 : params.m;

                const omega = isPendulum ? Math.sqrt(params.g / safeL) : Math.sqrt(params.k / safeM);
                const T = omega === 0 ? Infinity : (2 * Math.PI) / omega;
                const phase = omega * time;
                
                // คำนวณตำแหน่ง (x)
                const x = isPendulum ? (params.A/150) * Math.cos(phase) : params.A * Math.cos(phase);
                // คำนวณความเร็ว (v)
                const v = isPendulum ? -(params.A/150) * omega * Math.sin(phase) : -params.A * omega * Math.sin(phase);
                // คำนวณความเร่ง (a) -> a = -omega^2 * x
                const a = isPendulum ? -(params.A/150) * Math.pow(omega, 2) * Math.cos(phase) : -params.A * Math.pow(omega, 2) * Math.cos(phase);
                
                return { omega, T, x, v, a, phase };
            }, [topic, params, time]);

            // อัพเดตกราฟสำหรับหัวข้อที่ 4
            useEffect(() => {
                if (topic === 4) {
                    graphHistory.current.push({ t: time, x: physics.x, v: physics.v });
                    if (graphHistory.current.length > 200) {
                        graphHistory.current.shift();
                    }
                } else {
                    graphHistory.current = [];
                }
            }, [time, topic, physics.x, physics.v]);

            const renderSimulation = () => {
                const { x, v, a, phase, T } = physics;
                const cx = 200, cy = 110;

                // --- บทที่ 6: ลูกตุ้มนาฬิกา ---
                if (topic === 6) { 
                    const lx = cx + Math.sin(x) * (params.L * 70);
                    const ly = 20 + Math.cos(x) * (params.L * 70);
                    return (
                        <svg width="100%" height="220" viewBox="0 0 400 220" className="drop-shadow-xl">
                            <line x1={cx} y1="20" x2={lx} y2={ly} stroke="#94a3b8" strokeWidth="4" />
                            <circle cx={cx} cy="20" r="6" fill="#1e293b" />
                            <circle cx={lx} cy={ly} r={15 + params.m * 5} fill="#2563eb" stroke="white" strokeWidth="3" />
                            <text x={lx} y={ly+5} fill="white" textAnchor="middle" className="text-[10px] font-black">{params.m.toFixed(1)}kg</text>
                            <text x={cx} y="200" textAnchor="middle" className="text-xs font-bold text-slate-400 italic">"ลองปรับมวลดู... ความเร็วแกว่งจะไม่เปลี่ยน!"</text>
                        </svg>
                    );
                }

                // --- บทที่ 4: วิเคราะห์กราฟ (Vertical Spring Seismograph) ---
                if (topic === 4) {
                    const cx = 340; // Spring on the right
                    const cy = 130; // Equilibrium y position
                    const penX = cx - 20; // Pen touches the left side of the mass
                    
                    const massY = cy - x * 1.0; 
                    
                    const pointsX = graphHistory.current.map((pt, i) => {
                        const age = graphHistory.current.length - 1 - i;
                        return `${penX - age * 1.5},${cy - pt.x * 1.0}`;
                    }).join(' ');

                    const pointsV = graphHistory.current.map((pt, i) => {
                        const age = graphHistory.current.length - 1 - i;
                        return `${penX - age * 1.5},${cy - pt.v * 1.0}`;
                    }).join(' ');

                    return (
                        <svg width="100%" height="220" viewBox="0 0 400 220" className="drop-shadow-xl">
                            {/* Center equilibrium line for graph */}
                            <line x1="0" y1={cy} x2="400" y2={cy} stroke="#cbd5e1" strokeDasharray="3,3" />

                            {/* Graphs */}
                            {pointsX && <polyline points={pointsX} fill="none" stroke="#3b82f6" strokeWidth="3" />}
                            {pointsV && <polyline points={pointsV} fill="none" stroke="#10b981" strokeWidth="2" strokeDasharray="4,4" />}
                            
                            {/* Vertical Spring on the right */}
                            <line x1={cx-20} y1="20" x2={cx+20} y2="20" stroke="#1e293b" strokeWidth="4" />
                            <path d={`M ${cx},20 ${Array.from({length: 21}).map((_, i) => `L ${cx + (i%2?10:-10)*(i===0||i===21?0:1)},${20 + i*(massY-20-15)/21}`).join(' ')}`} fill="none" stroke="#2563eb" strokeWidth={2 + params.k/10} />
                            <rect x={cx-15} y={massY-15} width="30" height="30" rx="5" fill="#2563eb" stroke="white" strokeWidth="2" />
                            
                            {/* Trace line from mass to pen */}
                            <line x1={penX} y1={massY} x2={cx-15} y2={massY} stroke="#3b82f6" strokeWidth="2" />

                            {/* The "Pen" point */}
                            {graphHistory.current.length > 0 && (
                                <g>
                                    <circle cx={penX} cy={massY} r="4" fill="#3b82f6" />
                                    <circle cx={penX} cy={cy - v*1.0} r="4" fill="#10b981" />
                                </g>
                            )}

                            {/* Legend */}
                            <rect x="20" y="20" width="10" height="10" fill="#3b82f6" />
                            <text x="35" y="29" fontSize="10" fill="#3b82f6" fontWeight="bold">การกระจัด (x) ลากตามเส้นสปริง</text>
                            <rect x="20" y="35" width="10" height="10" fill="#10b981" />
                            <text x="35" y="44" fontSize="10" fill="#10b981" fontWeight="bold">ความเร็ว (v)</text>
                        </svg>
                    );
                }

                // --- บทที่ 1, 2, 3, 5: วัตถุติดปลายสปริง ---
                return (
                    <svg width="100%" height="220" viewBox="0 0 400 220" className="drop-shadow-xl">
                        <line x1={cx} y1="40" x2={cx} y2="180" stroke="#cbd5e1" strokeDasharray="5,5" />
                        <rect x="0" y="90" width="15" height="40" fill="#1e293b" />
                        <path d={`M 15,110 ${Array.from({length: 21}).map((_, i) => `L ${15 + i*(150+x)/21},${110 + (i%2?20:-20)*(i===0||i===21?0:1)}`).join(' ')}`} fill="none" stroke={topic === 1 ? "#ef4444" : "#2563eb"} strokeWidth={2 + params.k/10} />
                        <rect x={15+150+x-25} y="85" width="50" height="50" rx="10" fill="#2563eb" stroke="white" strokeWidth="3" />
                        <text x={15+150+x} y="115" fill="white" textAnchor="middle" className="text-xs font-black">{params.m.toFixed(1)}kg</text>
                        
                        {/* บทที่ 1: แรงดึงกลับ (Force) */}
                        {topic === 1 && (
                            <g>
                                <line x1={15+150+x} y1="110" x2={cx} y2="110" stroke="#ef4444" strokeWidth="6" markerEnd="url(#arr-f)" />
                                <text x={(15+150+x+cx)/2} y="95" fill="#ef4444" textAnchor="middle" className="text-[10px] font-black italic">แรงดึงกลับ F</text>
                                <defs><marker id="arr-f" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker></defs>
                            </g>
                        )}

                        {/* บทที่ 2: คาบเวลา (Period Timer) */}
                        {topic === 2 && (
                            <g transform="translate(350, 40)">
                                <circle cx="0" cy="0" r="20" fill="none" stroke="#e2e8f0" strokeWidth="4" />
                                <path d={`M 0 -20 A 20 20 0 ${phase % (2*Math.PI) > Math.PI ? 1 : 0} 1 ${20 * Math.sin(phase % (2*Math.PI))} ${-20 * Math.cos(phase % (2*Math.PI))}`} fill="none" stroke="#f59e0b" strokeWidth="4" />
                                <text x="0" y="4" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#f59e0b">{( (phase % (2*Math.PI)) / (2*Math.PI) * T ).toFixed(1)}s</text>
                                <text x="0" y="35" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#94a3b8">คาบ = {T.toFixed(2)}s</text>
                            </g>
                        )}

                        {/* บทที่ 3: ความเร็ว (v) และความเร่ง (a) */}
                        {topic === 3 && (
                            <g>
                                {/* ความเร็ว (สีเขียว) */}
                                <line x1={15+150+x} y1="145" x2={15+150+x + v*1.2} y2="145" stroke="#10b981" strokeWidth="4" markerEnd="url(#arr-v)" />
                                <text x={15+150+x + v*1.2} y="135" fill="#10b981" textAnchor="middle" className="text-[10px] font-black">v</text>
                                <defs><marker id="arr-v" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3" markerHeight="3" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs>
                                
                                {/* ความเร่ง (สีม่วง) */}
                                <line x1={15+150+x} y1="165" x2={15+150+x + a*0.02} y2="165" stroke="#9333ea" strokeWidth="4" markerEnd="url(#arr-a)" />
                                <text x={15+150+x + a*0.02} y="180" fill="#9333ea" textAnchor="middle" className="text-[10px] font-black">a</text>
                                <defs><marker id="arr-a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3" markerHeight="3" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs>
                            </g>
                        )}
                    </svg>
                );
            };

            const topicData = [
                { id: 1, title: '1. ลักษณะการเคลื่อนที่', logic: 'แรงดึงกลับ (F) แปรผันตามค่า k และระยะ x (ชี้เข้าหาจุดสมดุลเสมอ)' },
                { id: 2, title: '2. ปริมาณที่เกี่ยวข้อง', logic: 'คาบ (T) คือเวลาครบรอบ สังเกตหน้าปัดนาฬิกาจับเวลาขวาบน' },
                { id: 3, title: '3. ความสัมพันธ์ x, v, a', logic: 'v มากสุดตรงกลาง, a มากสุดที่ริมขอบ (ทิศตรงข้ามระยะ x)' },
                { id: 4, title: '4. วิเคราะห์กราฟ', logic: 'กราฟ x (ฟ้า) วาดตามความสูงจริงของสปริง สังเกตว่าตอนสปริงไปถึงจุดสูงสุด ความเร็ว v (เขียว) จะเป็น 0 พอดี!' },
                { id: 5, title: '5. วัตถุติดปลายสปริง', logic: 'มวล (m) อยู่ตัวหาร ยิ่งมวลมากสั่นช้าลง (สปริงหนาขึ้นตามค่า k)' },
                { id: 6, title: '6. ลูกตุ้มนาฬิกา', logic: 'เชือกยิ่งยาว (L) คาบแกว่งยิ่งนาน แต่มวลไม่มีผลเลย' }
            ];

            const renderMathBox = () => {
                const { omega, T, x, v, a } = physics;
                const F = -params.k * x;
                
                if (topic === 1) {
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">สูตรแรงดึงกลับ: <span className="text-white">F = -kx</span></div>
                            <div className="text-slate-400 text-sm">แทนค่าสด: F = -({params.k}) × ({x.toFixed(1)})</div>
                            <div className="text-highlight-num text-2xl mt-2 font-bold text-yellow-400">F = {F.toFixed(0)} N</div>
                        </div>
                    );
                }
                if (topic === 2) {
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">สูตรคาบเวลา: <span className="text-white">T = 2π√(m/k)</span></div>
                            <div className="text-slate-400 text-sm">แทนค่า: T = 2π√({params.m.toFixed(1)} / {params.k})</div>
                            <div className="text-highlight-num text-2xl mt-2 font-bold text-yellow-400">T = {T.toFixed(2)} วินาที</div>
                        </div>
                    );
                }
                if (topic === 3) {
                    const vmax = omega * params.A;
                    const amax = Math.pow(omega, 2) * params.A;
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">สูตร: <span className="text-white">v_max = ωA, a_max = ω²A</span></div>
                            <div className="text-slate-400 text-sm">ความเร็วเชิงมุม (ω) = {omega.toFixed(2)} rad/s</div>
                            <div className="grid grid-cols-2 mt-2">
                                <div className="text-green-400 text-xl font-bold">v_max = {vmax.toFixed(0)}</div>
                                <div className="text-purple-400 text-xl font-bold">a_max = {amax.toFixed(0)}</div>
                            </div>
                        </div>
                    );
                }
                if (topic === 4) {
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">ตำแหน่ง <span className="text-blue-400">x = A cos(ωt)</span></div>
                            <div className="text-blue-400 text-lg font-bold">x ปัจจุบัน = {x.toFixed(1)} m</div>
                            <div className="text-slate-400 text-sm mt-2">ความเร็ว <span className="text-green-400">v = -Aω sin(ωt)</span></div>
                            <div className="text-green-400 text-lg font-bold">v ปัจจุบัน = {v.toFixed(1)} m/s</div>
                        </div>
                    );
                }
                if (topic === 5) {
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">สูตรความเร็วเชิงมุม: <span className="text-white">ω = √(k/m)</span></div>
                            <div className="text-slate-400 text-sm">แทนค่า: ω = √({params.k} / {params.m.toFixed(1)})</div>
                            <div className="text-highlight-num text-2xl mt-2 font-bold text-yellow-400">ω = {omega.toFixed(2)} rad/s</div>
                        </div>
                    );
                }
                if (topic === 6) {
                    return (
                        <div className="flex flex-col gap-1 w-full">
                            <div className="text-slate-400 text-sm">สูตรลูกตุ้ม: <span className="text-white">ω = √(g/L), T = 2π/ω</span></div>
                            <div className="text-slate-400 text-sm">แทนค่า: ω = √(9.8 / {params.L.toFixed(1)})</div>
                            <div className="grid grid-cols-2 mt-2 gap-4">
                                <div className="text-yellow-400 text-lg font-bold">ω = {omega.toFixed(2)} rad/s</div>
                                <div className="text-white text-lg font-bold">T = {T.toFixed(2)} วินาที</div>
                            </div>
                        </div>
                    );
                }
            };

            const renderSliders = () => {
                const showA = [1, 3, 4, 6].includes(topic);
                const showK = [1, 2, 3, 4, 5].includes(topic);
                const showM = [2, 3, 4, 5, 6].includes(topic);
                const showL = [6].includes(topic);

                const InputNum = ({ val, setVal, unit }) => {
                    const [localVal, setLocalVal] = useState(val.toString());
                    
                    useEffect(() => {
                        if (Number(localVal) !== val) {
                            setLocalVal(val.toString());
                        }
                    }, [val]);

                    const handleChange = (e) => {
                        const str = e.target.value;
                        setLocalVal(str);
                        const num = Number(str);
                        if (!isNaN(num)) {
                            setVal(num);
                        }
                    };

                    return (
                        <div className="flex items-center gap-1 bg-slate-100 rounded-md border border-slate-200 overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-200 transition-all">
                            <input 
                                type="number" 
                                step="any"
                                value={localVal} 
                                onChange={handleChange} 
                                className="w-16 bg-transparent text-blue-600 font-mono font-black text-center outline-none py-1 text-sm"
                            />
                            <span className="text-[10px] font-bold text-slate-400 pr-2">{unit}</span>
                        </div>
                    );
                };

                return (
                    <div className={`grid gap-6 ${showA || showL ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1'}`}>
                        {showA && (
                            <div className={`space-y-2 ${(!showK && !showM) ? 'col-span-1 md:col-span-2' : ''}`}>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">แอมพลิจูด (A):</span>
                                    <InputNum val={params.A} setVal={v => setParams({...params, A: v})} unit="m" />
                                </div>
                                <input type="range" min="10" max="150" value={params.A} onChange={e => setParams({...params, A: +e.target.value})} />
                            </div>
                        )}
                        {showL && (
                            <div className={`space-y-2 ${(!showM) ? 'col-span-1 md:col-span-2' : ''}`}>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">ยาวเชือก (L):</span>
                                    <InputNum val={params.L} setVal={v => setParams({...params, L: v})} unit="m" />
                                </div>
                                <input type="range" min="0.1" max="5.0" step="0.1" value={params.L} onChange={e => setParams({...params, L: +e.target.value})} />
                            </div>
                        )}
                        {showM && (
                            <div className="space-y-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">มวล (m):</span>
                                    <InputNum val={params.m} setVal={v => setParams({...params, m: v})} unit="kg" />
                                </div>
                                <input type="range" min="0.1" max="10.0" step="0.1" value={params.m} onChange={e => setParams({...params, m: +e.target.value})} />
                            </div>
                        )}
                        {showK && (
                            <div className="space-y-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">ค่าคงที่สปริง (k):</span>
                                    <InputNum val={params.k} setVal={v => setParams({...params, k: v})} unit="N/m" />
                                </div>
                                <input type="range" min="1" max="100" value={params.k} onChange={e => setParams({...params, k: +e.target.value})} />
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-screen flex flex-col bg-slate-50 overflow-hidden">
                    
                    {/* Topic Menu */}
                    <div className="bg-white border-b border-slate-200 p-2 overflow-x-auto tab-scroll flex gap-2 z-30">
                        {topicData.map(t => (
                            <button key={t.id} onClick={() => { setTopic(t.id); setTime(0); graphHistory.current = []; }} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all ${topic === t.id ? 'active-tab shadow-lg' : 'text-slate-400 bg-slate-100'}`}>
                                บทที่ {t.id}
                            </button>
                        ))}
                    </div>

                    {/* Simulation Area */}
                    <div className="flex-1 relative flex flex-col items-center justify-center p-6 pb-2">
                        <div className="w-full h-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 relative overflow-hidden flex flex-col">
                            <div className="p-6 pb-0 flex justify-between items-center">
                                <div>
                                    <h2 className="text-lg font-black text-slate-800 leading-none tracking-tighter uppercase">{topicData[topic-1].title}</h2>
                                    <p className="text-[10px] font-bold text-blue-500 mt-1 uppercase tracking-widest italic">{topicData[topic-1].logic}</p>
                                </div>
                                <div className="bg-slate-100 p-2 rounded-2xl flex gap-2">
                                    <button onClick={() => { setTime(0); graphHistory.current = []; }} className="text-slate-400 active:scale-90 transition-transform">
                                        <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5"/></svg>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative">
                                {renderSimulation()}
                            </div>

                            {/* Dynamic Formula Display */}
                            <div className="p-6 pt-0">
                                <div className="math-box shadow-lg">
                                    <div className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest opacity-80 border-b border-slate-600 pb-2">วิธีคิดและค่าที่คำนวณแบบ Real-time:</div>
                                    <div className="flex justify-center items-center w-full">
                                        {renderMathBox()}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Sliders Panel */}
                    <div className="bg-white rounded-t-[3rem] p-8 space-y-6 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] z-20 border-t border-slate-100">
                        
                        {renderSliders()}

                        {/* Logic Hint */}
                        <div className="text-center pt-2">
                            <p className="text-[10px] font-bold text-slate-400 italic">"ลองเลื่อน Slider ดูการเปลี่ยนแปลง... ตัวแปรที่ไม่มีผล จะไม่แสดงในหน้านี้!"</p>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
